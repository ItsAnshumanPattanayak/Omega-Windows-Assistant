application:
  name: Omega
  version: 0.1.0
  environment: development

user:
  display_name: Anshuman

assistant:
  activation_phrase: Hello Omega
  shutdown_phrase: Shut down Omega
  active_session_timeout_seconds: 300

logging:
  level: INFO
  console_enabled: true
  file_enabled: true
  max_file_size_mb: 5
  backup_count: 3

database:
  enabled: true
  filename: omega.db
  busy_timeout_ms: 5000
  journal_mode: WAL
  synchronous: NORMAL
  foreign_keys: true

safety:
  allow_administrator_operations: false
  allow_arbitrary_shell_commands: false
  permanent_deletion_enabled: false
  default_decision: deny
  confirmation_timeout_seconds: 30
  maximum_confirmation_attempts: 3
  allow_force_close: false
  allow_absolute_paths: false
  allow_network_paths: false
  allow_device_paths: false
  allow_destination_replace: false
  allow_folder_merge: false
  allow_cross_volume_destructive_move: false

applications:
  launch_verification_timeout_seconds: 5
  graceful_close_timeout_seconds: 5
  force_close_timeout_seconds: 3
  allow_force_close: false

files:
  default_location: desktop
  maximum_read_size_bytes: 1048576
  maximum_display_characters: 10000
  maximum_write_size_bytes: 1048576
  maximum_resulting_file_size_bytes: 5242880
  search_max_depth: 5
  search_max_results: 50
  allow_absolute_paths: false
  allow_permanent_deletion: false

folders:
  default_location: desktop
  maximum_listing_items: 100
  maximum_scan_depth: 10
  maximum_scan_items: 10000
  maximum_scan_bytes: 10737418240
  maximum_copy_depth: 20
  maximum_copy_items: 10000
  maximum_copy_bytes: 5368709120
  search_max_depth: 6
  search_max_results: 50
  allow_folder_merge: false
  allow_destination_replace: false
  allow_permanent_deletion: false
  allow_cross_volume_move: false

recovery:
  enabled: true
  allow_permanent_deletion: false
  require_confirmation_for_recycle: true
  require_confirmation_for_restore: true
  undo_timeout_seconds: 300
  maximum_undo_records: 20
  maximum_recycle_size_bytes: 5368709120
  persist_undo_records: true

history:
  enabled: true
  persistence_enabled: true
  default_limit: 20
  maximum_limit: 100
  maximum_export_bytes: 1048576
  preserve_active_undo_records: true

voice:
  enabled: false
  offline_recognition_enabled: true
  model_path: null
  microphone_device: null
  sample_rate_hz: 16000
  audio_block_size: 4000
  passive_listening_timeout_seconds: 1
  active_listening_timeout_seconds: 10
  active_session_timeout_seconds: 300
  maximum_transcript_characters: 1000
  minimum_confidence: 0.50
  speak_responses: true
  speech_rate: 180
  speech_volume: 1.0
  voice_name: null
  confirmation_confidence_threshold: 0.85
  return_to_passive_after_session: true

browser:
  enabled: true
  preferred_browser: edge
  automation_enabled: true
  allowed_schemes:
    - https
  allow_http: false
  allow_file_urls: false
  allow_localhost: false
  allow_private_networks: false
  allow_url_credentials: false
  allow_javascript_urls: false
  allow_data_urls: false
  allow_downloads: false
  allow_form_submission: false
  allow_sensitive_input: false
  allow_private_mode: false
  navigation_timeout_seconds: 20
  operation_timeout_seconds: 10
  maximum_open_tabs: 10
  maximum_url_characters: 2048
  maximum_page_title_characters: 300
  maximum_page_text_characters: 10000
  maximum_search_query_characters: 500
  maximum_bookmark_name_characters: 100
  default_search_engine: duckduckgo

system:
  enabled: true
  information_enabled: true
  audio_control_enabled: true
  brightness_control_enabled: true
  process_listing_enabled: true
  process_termination_enabled: false
  settings_pages_enabled: true
  power_actions_enabled: true
  lock_enabled: true
  shutdown_enabled: true
  restart_enabled: true
  sign_out_enabled: true
  sleep_enabled: true
  hibernate_enabled: false
  maximum_process_results: 50
  maximum_disk_results: 20
  maximum_network_results: 20
  minimum_volume_percent: 0
  maximum_volume_percent: 100
  minimum_brightness_percent: 10
  maximum_brightness_percent: 100
  maximum_control_increment_percent: 25
  power_confirmation_timeout_seconds: 30
  power_countdown_seconds: 10
  allow_cancel_power_countdown: true

scheduling:
  enabled: true
  timezone: system
  scheduler_poll_interval_seconds: 1
  claim_timeout_seconds: 300
  maximum_delivery_batch: 50
  maximum_active_items: 500
  maximum_title_characters: 120
  maximum_message_characters: 1000
  maximum_timer_duration_seconds: 604800
  maximum_alarm_horizon_days: 3650
  maximum_recurring_occurrences: 1000
  maximum_snooze_minutes: 1440
  default_snooze_minutes: 10
  deliver_overdue_items: true
  maximum_overdue_age_seconds: 86400
  speak_notifications: false
  restore_pending_items_on_startup: true
  allow_scheduled_commands: false
  allow_recurring_scheduled_commands: false

productivity:
  enabled: true
  maximum_notes: 5000
  maximum_task_lists: 200
  maximum_tasks: 10000
  maximum_note_title_characters: 200
  maximum_note_body_characters: 50000
  maximum_task_title_characters: 300
  maximum_task_description_characters: 5000
  maximum_tags_per_item: 20
  maximum_tag_characters: 50
  maximum_search_query_characters: 500
  maximum_search_results: 200
  maximum_export_bytes: 10485760
  allow_markdown_export: true
  allow_json_export: true
  allow_json_import: true
  allow_markdown_import: false
  preserve_archived_items: true
  reminder_linking_enabled: true
  automatically_create_deadline_reminders: false
